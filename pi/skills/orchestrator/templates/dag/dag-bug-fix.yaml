# DAG Template: bug-fix
#
# TDD-driven bug fix: reproduction test → fix → regression check.
# 3 batches, smallest viable workflow.
#
# Use: dag_synthesize({ goal_id: "GC-...", tasks: [<tasks below, edited>] })
#
# Every task declares a `prompt:` that satisfies the schema's minLength=20.
# Treat the bracketed `[...]` placeholders as edit-me markers before
# dispatching — they are required for the subagent to know what to do.

tasks:
  # ────────────────────────────────────────────────────────────
  # Batch 1: parallel investigation (read-only)
  # ────────────────────────────────────────────────────────────
  - id: P1
    description: "Locate the buggy code area + related call sites"
    plane: Observation
    priority: high
    subagent_type: Explore
    task_template: subagent-explore
    task_params:
      task_id: P1
      task_title: "Locate buggy area"
      sc_list: "SC1, SC2 (reproduction + green tests)"
      search_for: "[bug-related symbol/feature]"
      files_to_touch: "src/[bug-area]/"
    batch: 1
    depends_on: []
    isolation: none
    tdd: none
    files: ["src/[bug-area]/"]
    # Explore tasks contribute to discovery, not direct SC coverage.
    acceptance: {}
    output_schema:
      kind: file_list
      path: ".pi/orchestrator/task-P1-findings.json"

  - id: P2
    description: "Confirm reproduction steps + gather any user-reported edge cases"
    plane: Observation
    priority: high
    subagent_type: Explore
    task_template: subagent-explore
    task_params:
      task_id: P2
      task_title: "Confirm reproduction"
      sc_list: "SC1, SC2 (reproduction + green tests)"
      search_for: "[test files related to bug area]"
      files_to_touch: "test/[bug-area]/"
    batch: 1
    depends_on: []
    isolation: none
    tdd: none
    files: ["test/[bug-area]/"]
    acceptance: {}
    output_schema:
      kind: file_list
      path: ".pi/orchestrator/task-P2-findings.json"

  # ────────────────────────────────────────────────────────────
  # Batch 2: RED + GREEN (single developer task — fix includes its own test)
  # ────────────────────────────────────────────────────────────
  - id: P3
    description: "Write reproduction test (RED), then implement minimal fix (GREEN)"
    plane: Data
    priority: high
    subagent_type: software-developer
    task_template: subagent-software-developer
    task_params:
      task_id: P3
      task_title: "Fix the bug"
      sc_list: "SC1 (reproduction test exists), SC2 (all tests pass)"
      tdd_mode: strict
      upstream_outputs: "(none — no upstream tasks; discovery is informational only)"
      files_to_touch: "src/[bug-area]/[buggy-file].ts, test/[bug-area]/[reproduction-test].ts"
      bug_summary: "[user's bug description]"
      reproduction_steps: "[how to reproduce]"
    batch: 2
    depends_on: [P1, P2]
    isolation: worktree
    tdd: strict
    # Background-default for implement/audit (verified 2026-07-24).
    # Spawns the developer subagent and returns its agent id immediately;
    # the orchestrator can then `get_subagent_result` or `steer_subagent`
    # instead of blocking. The dispatcher would also default this to true
    # because subagent_type=software-developer, but the explicit annotation
    # documents intent at the call site.
    run_in_background: true
    files: ["src/[bug-area]/[buggy-file].ts", "test/[bug-area]/[reproduction-test].ts"]
    prompt: "RED-then-GREEN: write a failing reproduction test in test/[bug-area]/[reproduction-test].ts, then add the minimal fix in src/[bug-area]/[buggy-file].ts until `npm test` is green. The bug summary is in task_params.bug_summary and reproduction steps in task_params.reproduction_steps. Do not modify any file outside src/[bug-area]/ and test/[bug-area]/."
    acceptance:
      covers: [SC1, SC2]   # reproduction test exists + all tests pass
      self_check_cmd: "npm test"
    output_schema:
      kind: code_changes

  # ────────────────────────────────────────────────────────────
  # Batch 3: audit
  # ────────────────────────────────────────────────────────────
  - id: P4
    description: "Audit fix against acceptance criteria + check no regressions"
    plane: Security
    priority: medium
    subagent_type: software-auditor
    task_template: subagent-software-auditor
    task_params:
      task_id: P4
      task_title: "Audit the fix"
      sc_list: "SC1 (reproduction), SC2 (tests pass), SC3 (no regressions)"
      depth: fast
      task_report_path: ".pi/orchestrator/task-P3-report.md"
      isolation: none
    batch: 3
    depends_on: [P3]
    isolation: none
    tdd: none
    # Background default for implement/audit (verified 2026-07-24).
    # Auditor runs while the orchestrator can do other prep work;
    # `get_subagent_result` collects the verdict when needed.
    # The dispatcher would default this to true based on subagent_type.
    run_in_background: true
    files: []
    prompt: "Audit the bug fix in P3 against SC1/SC2/SC3. Read the developer's report at .pi/orchestrator/task-P3-report.md, re-run `npm test` to verify SC2, inspect the diff vs main to confirm SC3 (no drive-by refactor). Default verdict is NEEDS WORK; only flip to CERTIFIED with overwhelming evidence."
    acceptance:
      covers: [SC1, SC2, SC3, SC4, SC5]
    output_schema:
      kind: verdict
      path: ".pi/orchestrator/audit-P4.md"
