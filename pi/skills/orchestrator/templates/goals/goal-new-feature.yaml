# Goal Template: new-feature
#
# Use when: user asks to add a new feature / endpoint / module

id: GC-{date}-{short}
title: "Add [feature name] — [brief scope, ≤120 chars]"
rationale: |
  [user-facing value + business context]

success_criteria:
  - id: SC1
    criterion: "New [endpoint/module] exists at [path] and exposes [signature]"
    verification_cmd: "[file exists check] && grep -E '[expected export]' [path]"
  - id: SC2
    criterion: "Happy-path unit tests cover the new [endpoint/module]"
    verification_cmd: "npm test -- --grep '[feature name]'"
  - id: SC3
    criterion: "Error paths covered (validation failure, dependency failure, auth failure)"
    verification_cmd: "npm test -- --grep '[feature name].error'"
  - id: SC4
    criterion: "Typecheck and lint pass with no new warnings"
    verification_cmd: "npm run typecheck && npm run lint"
  - id: SC5
    criterion: "Integration with existing [system] verified end-to-end"
    verification_cmd: "[project integration test command]"

anti_goals:
  - "Do not break existing [API/module] behavior"
  - "Do not introduce hardcoded test fixtures"
  - "Do not skip error handling for the 'easy' path"
  - "Do not change unrelated modules"

scope:
  include:
    - "[path/to/new/module/]"
    - "[path/to/new/tests/]"
    - "[integration points]"
  exclude:
    - "[unrelated modules]"

constraints:
  must_use_existing_patterns: true
  max_dependency_additions: [0 or N — depends on feature]
  test_coverage_min: 80
  typecheck_required: true
  lint_required: true

done_definition: |
  All SC1-SC5 verified + audit PASS ≥ 90 + user-facing behavior documented