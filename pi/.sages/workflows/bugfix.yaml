apiVersion: sages.io/workflow-v1alpha1
kind: Workflow
metadata:
  name: bugfix
  description: |
    Bugfix workflow: reproduce → fix → verify → complete.
    Shorter path for hotfixes and incident response.
  author: vanpipy
  version: 1
spec:
  autoApprovePlans: false
  defaults:
    workspace: .sages/workspace
    timeout: 15m
  stages:
    - id: reproduce
      prompt: bugfix-reproduce
      trigger:
        type: state-absent
        path: .sages/workspace/repro.md
      completion:
        type: file-exists
        path: .sages/workspace/repro.md
      onComplete:
        transition: fix

    - id: fix
      prompt: bugfix-fix
      trigger:
        type: file-exists
        path: .sages/workspace/repro.md
      completion:
        type: file-exists
        path: .sages/workspace/fix.md
      onComplete:
        transition: verify

    - id: verify
      prompt: bugfix-verify
      trigger:
        type: file-exists
        path: .sages/workspace/fix.md
      completion:
        type: state-field
        field: verifyResult
        value: PASS
        op: "=="
      onComplete:
        transition: complete

    - id: complete
      terminal: true