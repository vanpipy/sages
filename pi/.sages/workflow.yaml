apiVersion: sages.io/workflow-v1alpha1
kind: WorkflowConfig
metadata:
  name: sages-default
  description: |
    Default sages workflow configuration. Points to four-sages as the
    active workflow. Use /sages-workflow to list or switch.
spec:
  activeWorkflow: four-sages
  onSwitch: strict
  bootstrap:
    onMissingConfig: fallback-to-default
    onEmptyWorkspace: auto-init